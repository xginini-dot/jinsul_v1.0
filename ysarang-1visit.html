<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>의사랑 주사 1회 상세 분석</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#090909;
      --bg2:#171512;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:#f7f3ea;
      --muted:#c7b89e;
      --muted2:#a69b89;
      --border:rgba(203,181,145,.28);
      --border2:rgba(203,181,145,.46);
      --thead:rgba(120,108,89,.58);
      --hover:rgba(203,181,145,.13);
      --gold:#cbb591;
      --gold2:#9f8b68;
      --shadow:0 24px 70px rgba(0,0,0,.40);
      --input:rgba(255,255,255,.075);
      --accent:#d4bd95;
      --blue:#67e8f9;
    }

    html[data-theme="light"]{
      --bg:#f5f1ea;
      --bg2:#fffaf2;
      --card:rgba(255,255,255,.82);
      --card2:rgba(255,255,255,.96);
      --text:#211d18;
      --muted:#76684f;
      --muted2:#7c756b;
      --border:rgba(126,106,73,.24);
      --border2:rgba(126,106,73,.42);
      --thead:rgba(203,181,145,.38);
      --hover:rgba(203,181,145,.20);
      --gold:#947b52;
      --gold2:#b99f74;
      --shadow:0 20px 60px rgba(80,64,40,.16);
      --input:rgba(255,255,255,.74);
      --accent:#947b52;
      --blue:#0284c7;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(203,181,145,.24), transparent 34%),
        linear-gradient(135deg, var(--bg), var(--bg2) 58%, #2a241d);
      color:var(--text);
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
    }

    .wm{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:0;
    }
    .wm img{
      width:min(760px,78vw);
      opacity:.055;
      filter:grayscale(1);
      user-select:none;
    }
    body>*{position:relative; z-index:1}

    header{
      max-width:1200px;
      margin:0 auto;
      padding:42px 18px 18px;
      text-align:center;
    }
    header .logo{
      width:250px;
      max-width:72vw;
      height:auto;
      display:block;
      margin:0 auto 16px;
      filter:drop-shadow(0 18px 36px rgba(0,0,0,.40));
    }
    .badge{
      display:inline-block;
      padding:8px 16px;
      border:1px solid var(--border2);
      border-radius:999px;
      color:var(--gold);
      font-size:13px;
      font-weight:900;
      letter-spacing:1px;
      margin-bottom:14px;
      background:rgba(255,255,255,.04);
    }
    h1{
      margin:0;
      font-size:clamp(30px,4vw,48px);
      letter-spacing:-.03em;
      font-weight:900;
      color:var(--text);
    }
    p.sub{
      margin:12px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
    }
    .header-tools{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .wrap{
      padding:16px 18px 72px;
      max-width:1280px;
      margin:0 auto;
    }
    .card{
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--border);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
      margin-top:18px;
      backdrop-filter:blur(14px);
      overflow:hidden;
    }
    .card-title{
      margin:0 0 16px;
      font-size:25px;
      font-weight:900;
      color:var(--text);
      letter-spacing:-.03em;
    }

    .grid{
      display:grid;
      gap:16px;
      grid-template-columns:repeat(4,1fr);
      align-items:stretch;
    }
    .grid > div{
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      background:rgba(255,255,255,.04);
      min-width:0;
    }
    label{
      display:block;
      font-size:14px;
      font-weight:900;
      color:var(--muted);
      margin-bottom:10px;
      line-height:1.45;
    }

    input[type=file]{
      width:100%;
      max-width:100%;
      min-height:58px;
      padding:0 14px;
      border-radius:16px;
      border:1px dashed var(--border2);
      background:var(--input);
      color:var(--text);
      font-size:14px;
      outline:none;
      display:flex;
      align-items:center;
    }
    input[type=file]::file-selector-button{
      height:40px;
      padding:0 18px;
      margin-right:14px;
      border:0;
      border-radius:12px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }

    .right{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      align-items:center;
      flex-wrap:wrap;
      margin-top:16px!important;
    }
    button,.theme-toggle{
      min-height:44px;
      border-radius:999px;
      border:1px solid var(--border2);
      background:rgba(203,181,145,.13)!important;
      color:var(--text)!important;
      font-weight:900;
      cursor:pointer;
      padding:0 18px;
      transition:.2s ease;
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }
    button:hover,.theme-toggle:hover{
      transform:translateY(-2px);
      background:rgba(203,181,145,.24)!important;
      border-color:var(--gold);
    }
    button:disabled{
      opacity:.48;
      cursor:not-allowed;
      transform:none;
    }

    .table-card{
      overflow:visible;
      margin-top:22px;
    }
    .table-card .card-title{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .table-card .card-title::before{
      content:"📋";
      font-size:25px;
    }
    #output{
      width:100%;
      overflow:hidden;
    }
    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      overflow:hidden;
      border-radius:22px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
    }
    th,td{
      border-bottom:1px solid rgba(203,181,145,.16);
      border-right:1px solid rgba(203,181,145,.12);
      padding:12px 8px;
      text-align:center;
      word-break:keep-all;
      white-space:normal;
      font-size:13px;
      line-height:1.35;
      color:var(--text);
    }
    th{
      position:static;
      background:var(--thead);
      z-index:1;
      color:var(--text);
      font-weight:900;
    }
    tbody tr:hover td{background:var(--hover)}
    .blue-text{color:var(--blue); font-weight:900}

    #resCount{
      font-size:13px!important;
      color:var(--muted)!important;
      font-weight:700!important;
    }

    @media(max-width:1020px){
      .grid{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:760px){
      header{padding-top:28px}
      header .logo{width:190px}
      .wrap{padding:10px 12px 56px}
      .card{border-radius:24px; padding:18px; margin-top:14px}
      .card-title{font-size:22px}
      .grid{grid-template-columns:1fr}
      .right{justify-content:flex-start}
      button,.theme-toggle{
        width:auto;
        min-height:44px;
        padding:0 14px;
        font-size:14px;
      }
      input[type=file]{
        min-height:54px;
        font-size:13px;
      }
      input[type=file]::file-selector-button{
        height:38px;
        padding:0 14px;
        margin-right:10px;
      }
      #output{
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
      }
      table{
        min-width:860px;
        table-layout:auto;
      }
      th,td{
        font-size:12px;
        padding:9px 7px;
      }
    }

    @media print{
      body{background:#fff!important; color:#111!important}
      .wm,.header-tools,.right,button{display:none!important}
      .card{box-shadow:none!important; border:1px solid #ddd!important}
      th,td{color:#111!important; border-color:#ddd!important}
    }
  </style>
</head>
<body>
  <div class="wm" aria-hidden="true"><img src="진설로고.png" alt=""></div>
  <header>
    <img src="진설로고.png" alt="JINSUL" class="logo" />
    <div class="badge">JINSUL ONE VISIT SYSTEM</div>
    <h1>의사랑 주사 1회 상세 분석</h1>
    <p class="sub">진료실별 초진 환자 중 기간 내 주사 처방이 1회인 환자 상세 정보</p>
    <div class="header-tools"><button type="button" id="themeToggle" class="theme-toggle">☀️ 라이트로 보기</button></div>
  </header>

  <div class="wrap">
    <div class="card">
      <h2 class="card-title">📁 파일 업로드</h2>
      <div class="grid">
        <div><label>초진 파일(진료실별)</label><input type="file" id="clinicFiles" multiple accept=".xlsx,.xls,.csv" /></div>
        <div><label>주사 파일</label><input type="file" id="bFile" accept=".xlsx,.xls,.csv" /></div>
        <div><label>총 환자(초진+재진)</label><input type="file" id="vFile" accept=".xlsx,.xls,.csv" /></div>
        <div><label>연락처 파일(휴대전화.xls)</label><input type="file" id="contactFile" accept=".xlsx,.xls,.csv" /></div>
      </div>
      <div class="right" style="margin-top:8px">
        <button id="runBtn">상세 리스트 추출</button>
        <button id="downloadBtn" disabled style="background:#fff">결과 다운로드(.xlsx)</button>
        <button id="clearBtn" style="background:#fff">초기화</button>
      </div>
    </div>

    <div class="card table-card">
      <h3 class="card-title">주사 1회 내원자 상세 목록 <span id="resCount" style="font-size:12px; color:var(--muted); font-weight:normal;"></span></h3>
      <div id="output"></div>
    </div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    let finalResult = [];

    function excelDateToISO(v) {
      if (!v) return '';
      if (typeof v === 'number') {
        const d = new Date(Math.round((v - 25569) * 86400 * 1000));
        return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
      }
      const s = String(v).trim();
      return s.length === 8 && /^\d{8}$/.test(s) ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : s;
    }

    /**
     * 휴대폰 번호 정규화 보강: 0 생략 보정 및 000-0000-0000 포맷 강제
     */
    function normalizePhone(raw) {
      if (!raw) return '-';
      let d = String(raw).replace(/\D+/g,''); // 숫자만 남기기
      
      if (!d) return '-';

      // 엑셀에서 앞자리 0이 생략되어 10...으로 시작하는 경우 복원
      if (d.startsWith('10') && (d.length === 9 || d.length === 10)) {
        d = '0' + d;
      }

      // 11자리(010-1234-5678) 또는 10자리(010-123-4567) 포맷팅
      if (d.length === 11) {
        return d.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
      } else if (d.length === 10) {
        return d.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
      }
      
      return d;
    }

    async function readSheet(file){
      const ab = await file.arrayBuffer();
      const wb = XLSX.read(ab, { type:'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      return XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
    }

    function parseGrid(rows) {
      const cleanTxt = (s) => String(s || "").replace(/[\uFEFF\u200B\s]/g, "").toLowerCase();
      const hi = rows.findIndex(r => r.some(c => cleanTxt(c) === '차트번호' || cleanTxt(c) === '성명' || cleanTxt(c) === '휴대전화'));
      const idx = hi === -1 ? 0 : hi;
      return {
        headers: rows[idx].map(h => cleanTxt(h)),
        body: rows.slice(idx + 1)
      };
    }

    async function run() {
      const clinicFiles = $('#clinicFiles').files;
      const bFile = $('#bFile').files[0], vFile = $('#vFile').files[0], cFile = $('#contactFile').files[0];
      if (!clinicFiles.length || !bFile || !vFile) return alert('필수 파일들을 업로드해주세요.');
      
      $('#runBtn').disabled = true; $('#runBtn').textContent = '분석 중...';

      try {
        const bGrid = parseGrid(await readSheet(bFile)), vGrid = parseGrid(await readSheet(vFile));
        const bMap = {}, vMap = {};
        
        const bIdX = bGrid.headers.indexOf('차트번호');
        const bDtX = bGrid.headers.findIndex(h => /일자|내원일|진료일/.test(h));
        bGrid.body.forEach(r => {
          const id = String(r[bIdX] || "").trim();
          if (!id || id === '차트번호') return;
          const d = excelDateToISO(r[bDtX]);
          if(id && d) (bMap[id] ??= new Set()).add(d);
        });

        const vIdX = vGrid.headers.indexOf('차트번호');
        const vDtX = vGrid.headers.findIndex(h => /일자|내원일|진료일/.test(h));
        vGrid.body.forEach(r => {
          const id = String(r[vIdX] || "").trim();
          if (!id || id === '차트번호') return;
          const d = excelDateToISO(r[vDtX]);
          if(id && d) (vMap[id] ??= new Set()).add(d);
        });

        let contactMap = {}; 
        if (cFile) {
          const cGrid = parseGrid(await readSheet(cFile));
          const cIdX = cGrid.headers.indexOf('차트번호');
          const cPhX = cGrid.headers.indexOf('휴대전화');
          const cNmX = cGrid.headers.indexOf('성명');
          
          cGrid.body.forEach(r => {
            const id = String(r[cIdX] || "").trim();
            if (!id || id === '차트번호') return;
            const ph = normalizePhone(r[cPhX]); // 정규화 적용
            const name = String(r[cNmX] || "").trim();
            if (id) contactMap[id] = { ph, name };
          });
        }

        const result = [];
        for (const f of clinicFiles) {
          const grid = parseGrid(await readSheet(f));
          const idX = grid.headers.indexOf('차트번호');
          const nmX = grid.headers.findIndex(h => /성명|환자|수진자/.test(h));
          
          grid.body.forEach(r => {
            const id = String(r[idX] || "").trim();
            if (!id || id === '차트번호') return;
            
            if (id && bMap[id] && bMap[id].size === 1) {
              const allV = Array.from(vMap[id] || []).sort();
              const finalName = (contactMap[id] && contactMap[id].name) ? contactMap[id].name : String(r[nmX] || "").trim();
              const finalPhone = (contactMap[id] && contactMap[id].ph) ? contactMap[id].ph : "-";

              result.push({ 
                '차트번호': id, 
                '환자명': finalName || "-", 
                '휴대폰': finalPhone, 
                '최초 내원일': allV[0] || '-', 
                '주사 내원일': Array.from(bMap[id])[0], 
                '최종 내원일': allV[allV.length - 1] || '-', 
                '총 내원횟수': allV.length, 
                '진료실': f.name.split('.')[0] 
              });
            }
          });
        }

        finalResult = Array.from(new Map(result.map(i => [i['차트번호'], i])).values());
        
        // [수정됨] 최초 내원일 기준 오름차순 정렬 추가
        finalResult.sort((a, b) => {
          if (a['최초 내원일'] < b['최초 내원일']) return -1;
          if (a['최초 내원일'] > b['최초 내원일']) return 1;
          return 0;
        });

        renderResult(finalResult);
      } catch (e) {
        console.error(e);
        alert('분석 실패');
      } finally {
        $('#runBtn').disabled = false;
        $('#runBtn').textContent = '상세 리스트 추출';
      }
    }

    function renderResult(data) {
      if (!data.length) { $('#output').innerHTML = '<p style="text-align:center; padding:20px;">조건에 맞는 환자가 없습니다.</p>'; return; }
      $('#resCount').textContent = `(대상자: ${data.length}명)`; $('#downloadBtn').disabled = false;
      const cols = ['차트번호', '환자명', '휴대폰', '최초 내원일', '주사 내원일', '최종 내원일', '총 내원횟수', '진료실'];
      let h = '<table><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
      data.forEach(r => {
        h += `<tr><td>${r['차트번호']}</td><td>${r['환자명']}</td><td>${r['휴대폰']}</td><td>${r['최초 내원일']}</td><td class="blue-text">${r['주사 내원일']}</td><td>${r['최종 내원일']}</td><td class="blue-text">${r['총 내원횟수']}</td><td>${r['진료실']}</td></tr>`;
      });
      $('#output').innerHTML = h + '</tbody></table>';
    }

    $('#runBtn').onclick = run;
    $('#clearBtn').onclick = () => location.reload();
    $('#downloadBtn').onclick = () => {
      const ws = XLSX.utils.json_to_sheet(finalResult);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "상세리스트");
      XLSX.writeFile(wb, `주사1회_상세리스트.xlsx`);
    };
  </script>

  <script>
    (function(){
      const root = document.documentElement;
      const saved = localStorage.getItem('jinsul-ysarang-onevisit-theme') || 'dark';
      root.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeToggle');
      function sync(){
        if(btn) btn.textContent = root.getAttribute('data-theme') === 'light' ? '🌙 다크로 보기' : '☀️ 라이트로 보기';
      }
      sync();
      if(btn){
        btn.addEventListener('click', function(){
          const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
          root.setAttribute('data-theme', next);
          localStorage.setItem('jinsul-ysarang-onevisit-theme', next);
          sync();
        });
      }
    })();
  </script>

</body>
</html>
